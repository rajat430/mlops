name: CI
on:
  push:
    branches: [ feature/** ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened,closed ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Auth and Download Data from Azure Blob Storage
      env:
        AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
        AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
      run: |
        dvc pull
    - name: Setup MLFLOW Local
      run: |
        mlflow server --backend-store-uri sqlite:///mlflow.db 2>&1 < /dev/null &
        sleep 10
    - name: Build Model
      run: |
        dvc repro
    - name: Publish_Metrics_From_MLFLOW
      run: |
        python3 src/publish_metrics.py
    - name: Publish_Report_To_Github
      uses: actions/upload-artifact@v4
      with:
        name: model-metrics-report
        path: mlflow_report.csv
    - name: Evaluation and Model Accuracy Check
      run: |
        #csv file is generated by publish_metrics.py and contains a column named "accuracy"
        accuracy=$(awk -F, 'NR>1 {print $2}' mlflow_report.csv)
        echo "Model Accuracy: $accuracy"
        if (( $(echo "$accuracy < ${{vars.ACCURACY_THRESHOLD}}" | bc -l) )); then
          echo "Model accuracy is below threshold. Failing the build."
          exit 1
        else
          echo "Model accuracy is above threshold. Build passed."
        fi
    - name: unit test cases
      run: |
        pytest -v
    - name: Build Docker Image
      run: |
        docker build -t mlops-app .
    - name: Scan Docker Image for Vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: mlops-app:latest
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      if: github.event.pull_request.merged == true && github.base_ref == 'main'
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Push Docker Image to Docker Hub
      uses: docker/build-push-action@v2
      if: github.event.pull_request.merged == true && github.base_ref == 'main'
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/mlops-app:${{github.sha}}
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  deploy:
    needs: build
    if: ${{github.event.pull_request.merged == true && github.base_ref == 'main'}}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Workflow
        uses: ./.github/workflows/CD.yaml
        with:
          image_sha_id: ${{github.sha}}


